general {
    lock_cmd = hyprlock
    before_sleep_cmd = hyprlock
}

listener {
    timeout = 300
    on-timeout = hyprlock
}

hyprlock: general {
    disable_loading_bar = true
    hide_cursor = true
}

background {
    path = ~/Pictures/Wallpapers/wallhaven-gw9l17_1920x1080.png
    blur_passes = 3
    blur_size = 6
}

# ─────────────────────────────
# CLOCK (main cyan focal point)
# ─────────────────────────────
label {
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    font_size = 96
    font_family = JetBrainsMono Nerd Font
    color = rgba(0, 212, 255, 1.0)

    position = 0, 100
    halign = center
    valign = center

    shadow_passes = 3
    shadow_color = rgba(0, 212, 255, 0.25)
}

# ─────────────────────────────
# STATUS TEXT (muted cyan-blue)
# ─────────────────────────────
label {
    text = locked
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    color = rgba(120, 180, 210, 0.85)

    position = 0, -20
    halign = center
    valign = center
}

# ─────────────────────────────
# INPUT FIELD (deep glass + cyan edge)
# ─────────────────────────────
input-field {
    size = 320, 55
    position = 0, -120
    halign = center
    valign = center

    outer_color = rgba(0, 212, 255, 0.55)
    inner_color = rgba(10, 18, 32, 0.92)

    font_color = rgba(230, 240, 255, 1.0)

    fade_on_empty = true
    rounding = 12
    outline_thickness = 2

    placeholder_text = Enter password...
    placeholder_color = rgba(120, 160, 190, 0.7)

    dots_spacing = 0.25
    dots_center = true
}

# ─────────────────────────────
# OPTIONAL: subtle ambient glow layer feel
# (simulated via shadow tone consistency)
# ─────────────────────────────
